<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taco Express Peabody — Voice Order (copy)</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="Taco Express Peabody voice order copy. Not the main menu site." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --lime: #84cc16;
      --terra: #ea580c;
      --cream: #fffbeb;
      --charcoal: #1c1917;
      --muted: rgba(255, 251, 235, 0.55);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--charcoal);
      color: var(--cream);
      display: flex;
      flex-direction: column;
      padding: 28px 20px 40px;
    }
    .top { text-align: center; }
    h1 {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2.6rem, 11vw, 4.2rem);
      letter-spacing: 0.06em;
      color: var(--lime);
      line-height: 1;
    }
    .outlet {
      margin-top: 14px;
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.55;
    }
    .outlet a {
      color: var(--lime);
      text-decoration: none;
      font-weight: 700;
    }
    .bottom {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding-top: 48px;
      padding-bottom: 12px;
    }
    #orderNowBtn {
      width: min(320px, 100%);
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 18px 28px;
      border-radius: 999px;
      background: var(--terra);
      color: #fff;
    }
    #orderNowBtn:hover { filter: brightness(1.08); }
    #orderNowBtn:disabled {
      opacity: 0.65;
      cursor: wait;
    }
    #orderNowBtn.live {
      background: var(--lime);
      color: #14532d;
    }
    #status {
      min-height: 1.2em;
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="top">
    <h1>Taco Express Peabody</h1>
    <p class="outlet">
      58 Pulaski Street<br>
      <a href="tel:+19789821800">(978) 982-1800</a>
    </p>
  </div>

  <div class="bottom">
    <button type="button" id="orderNowBtn">Order Now</button>
    <p id="status" aria-live="polite"></p>
  </div>

  <!-- Hidden element kept for autoplay unlock; playback is AudioContext (cleaner path). -->
  <audio id="remoteAudio" autoplay playsinline webkit-playsinline></audio>

  <script>
    (function () {
      var btn = document.getElementById('orderNowBtn');
      var statusEl = document.getElementById('status');
      var remoteAudio = document.getElementById('remoteAudio');
      remoteAudio.setAttribute('playsinline', 'true');
      remoteAudio.setAttribute('webkit-playsinline', 'true');
      remoteAudio.muted = true; // avoid double-play with AudioContext
      remoteAudio.volume = 1;

      var pc = null;
      var dc = null;
      var localStream = null;
      var audioCtx = null;
      var remoteSource = null;
      var remoteGain = null;
      var connected = false;
      var connecting = false;
      var history = [];
      var pendingCalls = {};

      /**
       * WebRTC path inspection notes (Massimo playback):
       * - Voice: cedar (session). Model: gpt-realtime-2.1.
       * - Transport: WebRTC Opus (browser negotiates opus/48000).
       * - PCM format fields on the Realtime session do NOT apply to WebRTC —
       *   they are for the WebSocket/media-proxy path only.
       * - Muffling fixes = pipeline (bitrate / AGC / playback graph), not prompts.
       */
      function tuneOpusSdp(sdp) {
        if (!sdp) return sdp;
        var out = String(sdp)
          .replace(/useinbandfec=0/g, 'useinbandfec=1')
          .replace(/usedtx=1/g, 'usedtx=0');
        // Raise Opus average bitrate on fmtp lines that already describe Opus params
        out = out.replace(/a=fmtp:(\d+) ([^\r\n]*)/g, function (line, _pt, params) {
          if (!/useinbandfec|maxplaybackrate|minptime/.test(params)) return line;
          var next = params;
          if (/maxaveragebitrate=\d+/.test(next)) {
            next = next.replace(/maxaveragebitrate=\d+/, 'maxaveragebitrate=128000');
          } else {
            next = next + ';maxaveragebitrate=128000';
          }
          if (!/stereo=/.test(next)) next = next + ';stereo=0;sprop-stereo=0';
          return 'a=fmtp:' + _pt + ' ' + next;
        });
        return out;
      }

      async function unlockSpeaker() {
        try {
          var AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return;
          if (!audioCtx) audioCtx = new AC();
          if (audioCtx.state === 'suspended') await audioCtx.resume();
        } catch (e) {}
      }

      async function playRemote(stream) {
        try {
          await unlockSpeaker();
          // Keep element attached (iOS/gesture) but muted — real playback via AudioContext
          remoteAudio.srcObject = stream;
          remoteAudio.muted = true;
          remoteAudio.volume = 1;
          try { await remoteAudio.play(); } catch (e) {}

          if (!audioCtx) return;
          if (remoteSource) {
            try { remoteSource.disconnect(); } catch (e) {}
            remoteSource = null;
          }
          if (!remoteGain) {
            remoteGain = audioCtx.createGain();
            // Slight presence — not a "clarity prompt," just gain on the render path
            remoteGain.gain.value = 1.12;
            remoteGain.connect(audioCtx.destination);
          }
          remoteSource = audioCtx.createMediaStreamSource(stream);
          remoteSource.connect(remoteGain);
        } catch (e) {
          console.warn('[Taco Massimo] AudioContext path failed — element fallback', e);
          remoteAudio.muted = false;
          try { await remoteAudio.play(); } catch (err) {}
        }
      }

      async function bumpSenderBitrate() {
        if (!pc) return;
        var senders = pc.getSenders ? pc.getSenders() : [];
        for (var i = 0; i < senders.length; i++) {
          var sender = senders[i];
          if (!sender.track || sender.track.kind !== 'audio') continue;
          try {
            var params = sender.getParameters();
            if (!params.encodings || !params.encodings.length) {
              params.encodings = [{}];
            }
            params.encodings.forEach(function (enc) {
              enc.maxBitrate = 128000;
            });
            await sender.setParameters(params);
          } catch (e) {
            console.warn('[Taco Massimo] setParameters bitrate', e);
          }
        }
      }

      function setStatus(msg) {
        statusEl.textContent = msg || '';
      }

      function pushHistory(role, text) {
        if (!text) return;
        history.push({ role: role, text: String(text).slice(0, 500) });
        if (history.length > 24) history = history.slice(-24);
      }

      function dcSend(obj) {
        if (!dc || dc.readyState !== 'open') return;
        dc.send(JSON.stringify(obj));
      }

      async function askSupervisor(question) {
        var resp = await fetch('/api/supervisor', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: question, history: history }),
        });
        if (!resp.ok) {
          var errText = await resp.text().catch(function () { return ''; });
          throw new Error('supervisor ' + resp.status + (errText ? ': ' + errText.slice(0, 160) : ''));
        }
        var data = await resp.json();
        return (data.answer || '').trim();
      }

      async function handleAskSupervisor(callId, rawArgs) {
        var question = '';
        try {
          var args = typeof rawArgs === 'string' ? JSON.parse(rawArgs || '{}') : (rawArgs || {});
          question = (args.question || '').trim();
        } catch (e) {
          question = String(rawArgs || '').trim();
        }
        if (!question) question = 'Help with the customer order.';

        setStatus('Massimo thinking…');
        var answer = '';
        try {
          answer = await askSupervisor(question);
        } catch (e) {
          console.error('[Taco Supervisor]', e);
          answer = 'Call us at (978) 982-1800.';
        }

        dcSend({
          type: 'conversation.item.create',
          item: {
            type: 'function_call_output',
            call_id: callId,
            output: answer,
          },
        });
        dcSend({ type: 'response.create' });
        setStatus('Massimo is on — talk anytime');
      }

      function onServerEvent(raw) {
        var data;
        try {
          data = JSON.parse(raw);
        } catch (e) {
          return;
        }
        if (!data || !data.type) return;

        if (data.type === 'response.function_call_arguments.done') {
          if (data.name === 'ask_supervisor' && data.call_id) {
            if (pendingCalls[data.call_id]) return;
            pendingCalls[data.call_id] = true;
            handleAskSupervisor(data.call_id, data.arguments || '{}').finally(function () {
              delete pendingCalls[data.call_id];
            });
          }
          return;
        }

        if (data.type === 'response.output_audio_transcript.done' && data.transcript) {
          pushHistory('massimo', data.transcript);
          return;
        }
        if (data.type === 'conversation.item.input_audio_transcription.completed' && data.transcript) {
          pushHistory('customer', data.transcript);
          return;
        }
      }

      function cleanup() {
        try { if (remoteSource) remoteSource.disconnect(); } catch (e) {}
        remoteSource = null;
        try { if (dc) dc.close(); } catch (e) {}
        try { if (pc) pc.close(); } catch (e) {}
        if (localStream) {
          localStream.getTracks().forEach(function (t) { t.stop(); });
        }
        pc = null;
        dc = null;
        localStream = null;
        connected = false;
        connecting = false;
        history = [];
        pendingCalls = {};
        btn.disabled = false;
        btn.classList.remove('live');
        btn.textContent = 'Order Now';
      }

      function hangUp() {
        cleanup();
        setStatus('');
      }

      async function startMassimo() {
        if (connecting) return;
        if (connected) {
          hangUp();
          return;
        }
        connecting = true;
        btn.disabled = true;
        btn.textContent = 'Connecting…';
        setStatus('Talking to Massimo…');

        try {
          await unlockSpeaker();

          var tokenPromise = fetch('/api/realtime-token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: '{}',
          }).then(async function (resp) {
            if (!resp.ok) {
              var errText = await resp.text().catch(function () { return ''; });
              throw new Error('token ' + resp.status + (errText ? ': ' + errText.slice(0, 180) : ''));
            }
            return resp.json();
          });

          // AEC on (speakers+mic). AGC OFF — it softens/muddies presence.
          localStream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: false,
              channelCount: 1,
            },
          });

          pc = new RTCPeerConnection();
          localStream.getTracks().forEach(function (track) {
            pc.addTrack(track, localStream);
          });

          pc.ontrack = function (ev) {
            var stream = ev.streams && ev.streams[0] ? ev.streams[0] : new MediaStream([ev.track]);
            playRemote(stream);
          };

          dc = pc.createDataChannel('oai-events');
          dc.addEventListener('message', function (ev) {
            onServerEvent(ev.data);
          });
          dc.addEventListener('open', function () {
            try {
              dcSend({
                type: 'response.create',
                response: {
                  instructions:
                    'Say EXACTLY and ONLY: "Hey, welcome to Taco Express. What are you in the mood for? What can I get you?" Give "Hey" a little bite. Then stop. Shut up. No menu. Nothing else.',
                },
              });
            } catch (e) {}
          });

          var offer = await pc.createOffer();
          var offerSdp = tuneOpusSdp(offer.sdp || '');
          await pc.setLocalDescription({ type: 'offer', sdp: offerSdp });

          var tokenPayload = await tokenPromise;
          var ephemeralKey = (tokenPayload.value || '').trim();
          if (!ephemeralKey) throw new Error('Missing ephemeral token');

          var sdpResp = await fetch('https://api.openai.com/v1/realtime/calls', {
            method: 'POST',
            body: offerSdp,
            headers: {
              Authorization: 'Bearer ' + ephemeralKey,
              'Content-Type': 'application/sdp',
            },
          });
          if (!sdpResp.ok) {
            var sdpErr = await sdpResp.text().catch(function () { return ''; });
            throw new Error('realtime ' + sdpResp.status + (sdpErr ? ': ' + sdpErr.slice(0, 180) : ''));
          }
          var answerSdp = tuneOpusSdp(await sdpResp.text());
          await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
          await bumpSenderBitrate();

          connected = true;
          connecting = false;
          btn.disabled = false;
          btn.classList.add('live');
          btn.textContent = 'Hang Up';
          setStatus('Massimo is on — counter mode');
        } catch (e) {
          console.error('[Taco Massimo]', e);
          cleanup();
          setStatus('Could not start Massimo. Try again.');
        }
      }

      btn.addEventListener('click', function () {
        startMassimo();
      });
    })();
  </script>
</body>
</html>
