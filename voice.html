<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taco Express PB — Voice Order (copy)</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="Taco Express Peabody voice order copy — Massimo. Not the main menu site." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --lime: #84cc16;
      --terra: #ea580c;
      --cream: #fffbeb;
      --charcoal: #1c1917;
      --muted: rgba(255, 251, 235, 0.55);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--charcoal);
      color: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      text-align: center;
    }
    .copy-note {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(234, 88, 12, 0.18);
      border-bottom: 1px solid rgba(234, 88, 12, 0.45);
      color: #fdba74;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 8px 12px;
    }
    h1 {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2.8rem, 12vw, 4.5rem);
      letter-spacing: 0.06em;
      color: var(--lime);
      line-height: 1;
      margin-top: 28px;
    }
    .domain {
      margin-top: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.02em;
    }
    .domain a {
      color: var(--muted);
      text-decoration: none;
    }
    .outlet {
      margin-top: 18px;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.55;
    }
    .outlet a {
      color: var(--lime);
      text-decoration: none;
      font-weight: 700;
    }
    .voice-box {
      margin-top: 40px;
      width: min(360px, 100%);
      padding: 22px 20px;
      border-radius: 16px;
      background: rgba(234, 88, 12, 0.12);
      border: 1px solid rgba(234, 88, 12, 0.45);
    }
    .voice-box p {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .voice-box strong { color: var(--cream); }
    #autoOnBtn {
      width: 100%;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-weight: 800;
      font-size: 1.05rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 16px 20px;
      border-radius: 999px;
      background: var(--terra);
      color: #fff;
    }
    #autoOnBtn:hover { filter: brightness(1.08); }
    #autoOnBtn.on {
      background: var(--lime);
      color: #14532d;
    }
    #status {
      margin-top: 12px;
      min-height: 1.2em;
      font-size: 0.82rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="copy-note">Copy only — not the live menu board</div>

  <h1>Taco Express PB</h1>
  <p class="domain"><a href="https://www.tacoexpresspeabody.com/">tacoexpresspeabody.com</a></p>

  <p class="outlet">
    <strong>58 Pulaski Street</strong>, Unit B<br>
    Peabody, MA 01960<br>
    <a href="tel:+19789821800">(978) 982-1800</a>
  </p>

  <div class="voice-box">
    <p><strong>Massimo</strong> — “Hey, what can I get you?”</p>
    <button type="button" id="autoOnBtn">Auto On</button>
    <p id="status"></p>
  </div>

  <script>
    (function () {
      var btn = document.getElementById('autoOnBtn');
      var status = document.getElementById('status');
      var on = false;
      btn.addEventListener('click', function () {
        on = !on;
        btn.classList.toggle('on', on);
        btn.textContent = on ? 'Auto On · Listening' : 'Auto On';
        status.textContent = on
          ? 'Massimo ready — voice wiring next.'
          : '';
      });
    })();
  </script>
</body>
</html>
