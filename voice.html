<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taco Express Peabody — Voice Order (copy)</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="Taco Express Peabody voice order copy. Not the main menu site." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --lime: #84cc16;
      --terra: #ea580c;
      --cream: #fffbeb;
      --charcoal: #1c1917;
      --muted: rgba(255, 251, 235, 0.55);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--charcoal);
      color: var(--cream);
      display: flex;
      flex-direction: column;
      padding: 28px 20px 40px;
    }
    .top {
      text-align: center;
    }
    h1 {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2.6rem, 11vw, 4.2rem);
      letter-spacing: 0.06em;
      color: var(--lime);
      line-height: 1;
    }
    .outlet {
      margin-top: 14px;
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.55;
    }
    .outlet a {
      color: var(--lime);
      text-decoration: none;
      font-weight: 700;
    }
    .bottom {
      margin-top: auto;
      display: flex;
      justify-content: center;
      padding-top: 48px;
      padding-bottom: 12px;
    }
    #orderNowBtn {
      width: min(320px, 100%);
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 18px 28px;
      border-radius: 999px;
      background: var(--terra);
      color: #fff;
    }
    #orderNowBtn:hover { filter: brightness(1.08); }
  </style>
</head>
<body>
  <div class="top">
    <h1>Taco Express Peabody</h1>
    <p class="outlet">
      58 Pulaski Street<br>
      <a href="tel:+19789821800">(978) 982-1800</a>
    </p>
  </div>

  <div class="bottom">
    <button type="button" id="orderNowBtn">Order Now</button>
  </div>
</body>
</html>
