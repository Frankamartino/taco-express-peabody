<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taco Express Peabody — Voice Order (copy)</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="Taco Express Peabody voice order copy. Not the main menu site." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --lime: #84cc16;
      --terra: #ea580c;
      --white: #ffffff;
      --charcoal: #1c1917;
    }
    html {
      background: var(--charcoal);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--charcoal);
      color: var(--white);
      display: flex;
      flex-direction: column;
      padding: 28px 20px 40px;
    }
    .top { text-align: center; flex-shrink: 0; }
    h1 {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2.6rem, 11vw, 4.2rem);
      letter-spacing: 0.06em;
      color: var(--lime);
      line-height: 1;
    }
    .outlet {
      margin-top: 14px;
      font-size: 0.95rem;
      color: #ffffff;
      opacity: 1;
      line-height: 1.55;
    }
    .outlet a {
      color: var(--lime);
      text-decoration: none;
      font-weight: 700;
    }

    /* 80mm thermal — tighter type */
    .ticket-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 0 8px;
      min-height: 140px;
    }
    #ticket {
      width: 80mm;
      max-width: 100%;
      color: var(--white);
      font-size: 0.88rem;
      line-height: 1.25;
      font-variant-numeric: tabular-nums;
      display: none;
    }
    #ticket.has-items { display: block; }
    .cust {
      margin-bottom: 10px;
      font-weight: 600;
      line-height: 1.35;
    }
    .cust .email {
      font-weight: 400;
      font-size: 0.82rem;
    }
    .line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 2.1rem 4.2rem;
      column-gap: 6px;
      align-items: baseline;
      margin-bottom: 6px;
    }
    .line .title {
      font-weight: 600;
      overflow-wrap: anywhere;
    }
    .line .qty {
      white-space: nowrap;
      font-weight: 600;
      text-align: right;
      letter-spacing: 0.02em;
    }
    .line .price {
      font-weight: 700;
      white-space: nowrap;
      text-align: right;
    }
    .line-note {
      grid-column: 1 / -1;
      margin: -1px 0 8px;
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--white);
    }
    .totals {
      margin-top: 10px;
      padding-top: 2px;
    }
    .totals .line {
      margin-bottom: 4px;
      font-weight: 400;
    }
    .totals .line .title { font-weight: 500; }
    .totals .line.total-row {
      margin-top: 6px;
    }
    .totals .line.total-row .title,
    .totals .line.total-row .price {
      font-weight: 800;
      font-size: 0.98rem;
    }
    .paid-stamp {
      margin-top: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--lime);
      font-size: 0.95rem;
    }
    .paid-stamp .pi {
      display: block;
      margin-top: 4px;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      font-size: 0.72rem;
      color: #ffffff;
      opacity: 1;
    }
    .instr {
      margin-top: 12px;
      font-size: 0.78rem;
      color: var(--white);
    }
    .instr .label { font-weight: 700; margin-bottom: 3px; }
    .instr .body { white-space: pre-wrap; font-weight: 400; }

    .bottom {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding-top: 24px;
      padding-bottom: 12px;
      flex-shrink: 0;
    }
    #orderNowBtn {
      width: min(320px, 100%);
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 18px 28px;
      border-radius: 999px;
      background: var(--terra);
      color: #fff;
    }
    #orderNowBtn:hover { filter: brightness(1.08); }
    #orderNowBtn:disabled {
      opacity: 0.65;
      cursor: wait;
    }
    #orderNowBtn.live {
      background: var(--lime);
      color: #14532d;
    }
    #status {
      min-height: 1.2em;
      font-size: 0.82rem;
      color: #ffffff;
      opacity: 1;
      text-align: center;
    }
    .card-trust {
      margin-top: 6px;
      max-width: 22rem;
      font-size: 0.78rem;
      line-height: 1.45;
      color: var(--white);
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
    }
    .card-trust a {
      color: var(--lime);
      text-decoration: none;
      font-weight: 700;
    }
    .card-trust-sub {
      font-size: 0.72rem;
      color: #ffffff;
      opacity: 1;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="top">
    <h1>Taco Express Peabody</h1>
    <p class="outlet">
      58 Pulaski Street<br>
      <a href="tel:+19789821800">(978) 982-1800</a>
    </p>
  </div>

  <div class="ticket-wrap">
    <div id="ticket" aria-live="polite"></div>
  </div>

  <div class="bottom">
    <button type="button" id="orderNowBtn">Order Now</button>
    <p id="status" aria-live="polite"></p>
    <p class="card-trust">
      <a href="/voice-signup">First-time customers: sign up for hands-free ordering</a>
      <span class="card-trust-sub">Stripe keeps your card number safe — we never see it.</span>
    </p>
  </div>

  <audio id="remoteAudio" autoplay playsinline></audio>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <script>
    (function () {
      var btn = document.getElementById('orderNowBtn');
      var statusEl = document.getElementById('status');
      var ticketEl = document.getElementById('ticket');
      var remoteAudio = document.getElementById('remoteAudio');
      remoteAudio.setAttribute('playsinline', 'true');
      remoteAudio.setAttribute('webkit-playsinline', 'true');
      remoteAudio.muted = false;
      remoteAudio.volume = 1;

      var pc = null;
      var dc = null;
      var localStream = null;
      var connected = false;
      var connecting = false;
      var sessionAlive = false;
      var hangUpTimer = null;
      var history = [];
      var pendingCalls = {};
      var taxRate = 0.07;
      var order = {
        lines: [],
        tip: 0,
        tipAsked: false,
        instructions: '',
        paid: false,
        paymentIntentId: '',
      };
      var customer = { firstName: '', lastName: '', email: '', phone: '' };
      var fulfillment = ''; // pickup | delivery

      function money(n) {
        var x = Math.round((Number(n) || 0) * 100) / 100;
        return '$' + x.toFixed(2);
      }

      function hasCustomer() {
        return !!(customer.firstName || customer.lastName || customer.email || customer.phone);
      }

      function ticketVisible() {
        return order.lines.length > 0 || hasCustomer();
      }

      function taxableSubtotal() {
        return order.lines.reduce(function (sum, line) {
          if (line.taxIncluded) return sum;
          return sum + (Number(line.price) || 0);
        }, 0);
      }

      function subtotal() {
        return order.lines.reduce(function (sum, line) {
          return sum + (Number(line.price) || 0);
        }, 0);
      }

      function renderTicket() {
        if (!ticketVisible()) {
          ticketEl.classList.remove('has-items');
          ticketEl.innerHTML = '';
          return;
        }
        ticketEl.classList.add('has-items');
        var sub = subtotal();
        var taxable = taxableSubtotal();
        var tax = Math.round(taxable * taxRate * 100) / 100;
        var tip = Math.round((Number(order.tip) || 0) * 100) / 100;
        var total = Math.round((sub + tax + tip) * 100) / 100;

        var html = '';
        if (hasCustomer() || fulfillment) {
          var nameBits = [customer.firstName, customer.lastName].filter(Boolean).join(' ');
          html += '<div class="cust">';
          if (nameBits) html += '<div>' + escapeHtml(nameBits) + '</div>';
          if (customer.phone) {
            html += '<div class="email">' + escapeHtml(customer.phone) + '</div>';
          }
          if (customer.email) {
            html += '<div class="email">' + escapeHtml(customer.email) + '</div>';
          }
          if (fulfillment) {
            html +=
              '<div class="email">' +
              escapeHtml(fulfillment === 'delivery' ? 'Delivery' : 'Pickup') +
              '</div>';
          }
          html += '</div>';
        }

        order.lines.forEach(function (line) {
          var qty = line.qty != null ? line.qty : 1;
          html +=
            '<div class="line">' +
            '<div class="title">' +
            escapeHtml(line.title) +
            '</div>' +
            '<div class="qty">' +
            qty +
            'x</div>' +
            '<div class="price">' +
            money(line.price) +
            '</div>' +
            (line.note
              ? '<div class="line-note">' + escapeHtml(line.note) + '</div>'
              : '') +
            '</div>';
        });

        if (order.lines.length) {
          html +=
            '<div class="totals">' +
            '<div class="line"><div class="title">Subtotal</div><div class="qty"></div><div class="price">' +
            money(sub) +
            '</div></div>' +
            '<div class="line"><div class="title">Tax ' +
            (taxRate * 100).toFixed(0) +
            '%</div><div class="qty"></div><div class="price">' +
            money(tax) +
            '</div></div>' +
            '<div class="line"><div class="title">Tip</div><div class="qty"></div><div class="price">' +
            money(tip) +
            '</div></div>' +
            '<div class="line total-row"><div class="title">Total</div><div class="qty"></div><div class="price">' +
            money(total) +
            '</div></div>' +
            (order.paid
              ? '<div class="paid-stamp">Paid' +
                (order.paymentIntentId
                  ? '<span class="pi">' + escapeHtml(order.paymentIntentId) + '</span>'
                  : '') +
                '</div>'
              : '') +
            '</div>';
        }

        if (order.instructions && String(order.instructions).trim()) {
          html +=
            '<div class="instr"><div class="label">Chef notes / allergies</div><div class="body">' +
            escapeHtml(String(order.instructions).trim()) +
            '</div></div>';
        }

        ticketEl.innerHTML = html;
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function resetOrder() {
        order = {
          lines: [],
          tip: 0,
          tipAsked: false,
          instructions: '',
          paid: false,
          paymentIntentId: '',
        };
        renderTicket();
      }

      function resetCustomer() {
        customer = { firstName: '', lastName: '', email: '', phone: '' };
        fulfillment = '';
      }

      function ticketSnapshot() {
        var sub = subtotal();
        var taxable = taxableSubtotal();
        var tax = Math.round(taxable * taxRate * 100) / 100;
        var tip = Math.round((Number(order.tip) || 0) * 100) / 100;
        var total = Math.round((sub + tax + tip) * 100) / 100;
        return {
          lines: order.lines,
          customer: customer,
          fulfillment: fulfillment || '',
          subtotal: sub,
          taxable: taxable,
          tax: tax,
          tip: tip,
          total: total,
          taxRate: taxRate,
          instructions: order.instructions || '',
          paid: !!order.paid,
          paymentIntentId: order.paymentIntentId || '',
          tipAsked: !!order.tipAsked,
        };
      }

      function payReadyGaps() {
        var gaps = [];
        if (!customer.lastName) gaps.push('lastName');
        if (!customer.email) gaps.push('email');
        if (!customer.phone) gaps.push('phone');
        if (!order.tipAsked) gaps.push('tip');
        if (!fulfillment) gaps.push('fulfillment');
        return gaps;
      }

      function setStatus(msg) {
        statusEl.textContent = msg || '';
      }

      function pushHistory(role, text) {
        if (!text) return;
        history.push({ role: role, text: String(text).slice(0, 500) });
        if (history.length > 24) history = history.slice(-24);
      }

      function dcSend(obj) {
        if (!sessionAlive || !dc || dc.readyState !== 'open') return;
        try {
          dc.send(JSON.stringify(obj));
        } catch (e) {}
      }

      function replyTool(callId, output) {
        if (!sessionAlive) return;
        dcSend({
          type: 'conversation.item.create',
          item: {
            type: 'function_call_output',
            call_id: callId,
            output: typeof output === 'string' ? output : JSON.stringify(output),
          },
        });
        dcSend({ type: 'response.create' });
      }

      async function askSupervisor(question) {
        var resp = await fetch('/api/supervisor', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: question, history: history }),
        });
        if (!resp.ok) {
          var errText = await resp.text().catch(function () { return ''; });
          throw new Error('supervisor ' + resp.status + (errText ? ': ' + errText.slice(0, 160) : ''));
        }
        var data = await resp.json();
        return (data.answer || '').trim();
      }

      async function handleAskSupervisor(callId, rawArgs) {
        var question = '';
        try {
          var args = typeof rawArgs === 'string' ? JSON.parse(rawArgs || '{}') : (rawArgs || {});
          question = (args.question || '').trim();
        } catch (e) {
          question = String(rawArgs || '').trim();
        }
        if (!question) question = 'Help with the customer order.';

        setStatus('Massimo thinking…');
        var answer = '';
        try {
          answer = await askSupervisor(question);
        } catch (e) {
          console.error('[Taco Supervisor]', e);
          answer = 'Call us at (978) 982-1800.';
        }
        replyTool(callId, answer);
        setStatus('Massimo is on — talk anytime');
      }

      async function callMem0(action, payload) {
        try {
          var resp = await fetch('/api/mem0', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(Object.assign({ action: action }, payload || {})),
          });
          var data = await resp.json().catch(function () { return {}; });
          if (!resp.ok) {
            // Soft-fail — never stall Massimo (503 = Mem0 not configured)
            return {
              ok: true,
              skipped: true,
              configured: false,
              memories: [],
              error: data.error || ('mem0 ' + resp.status),
              hint: data.hint || '',
            };
          }
          return data;
        } catch (e) {
          return { ok: true, skipped: true, configured: false, memories: [], error: 'mem0 network' };
        }
      }

      function handleOrderTool(name, callId, rawArgs) {
        var args = {};
        try {
          args = typeof rawArgs === 'string' ? JSON.parse(rawArgs || '{}') : (rawArgs || {});
        } catch (e) {
          args = {};
        }

        if (name === 'add_order_line') {
          var title = String(args.title || '').trim();
          var price = Number(args.price);
          var qty = args.qty != null ? Number(args.qty) : 1;
          if (!title || !isFinite(price)) {
            replyTool(callId, { ok: false, error: 'title and price required' });
            return;
          }
          order.lines.push({
            title: title,
            price: price,
            qty: isFinite(qty) && qty > 0 ? qty : 1,
            note: args.note ? String(args.note).trim() : '',
            taxIncluded: !!args.taxIncluded,
          });
          renderTicket();
          replyTool(callId, { ok: true, ticket: ticketSnapshot() });
          return;
        }

        if (name === 'set_customer') {
          if (args.firstName != null && String(args.firstName).trim()) {
            customer.firstName = String(args.firstName).trim();
          }
          if (args.lastName != null && String(args.lastName).trim()) {
            customer.lastName = String(args.lastName).trim();
          }
          if (args.email != null && String(args.email).trim()) {
            customer.email = String(args.email).trim().toLowerCase();
          }
          if (args.phone != null && String(args.phone).trim()) {
            customer.phone = String(args.phone).trim();
          }
          renderTicket();
          replyTool(callId, { ok: true, ticket: ticketSnapshot() });
          return;
        }

        if (name === 'set_fulfillment') {
          var ft = String(args.type || '').trim().toLowerCase();
          fulfillment = ft === 'delivery' ? 'delivery' : ft === 'pickup' ? 'pickup' : '';
          renderTicket();
          replyTool(callId, { ok: true, ticket: ticketSnapshot() });
          return;
        }

        if (name === 'set_spice') {
          var level = String(args.level || '').trim().toLowerCase();
          if (level !== 'mild' && level !== 'spicy') {
            replyTool(callId, { ok: false, error: 'level must be mild or spicy' });
            return;
          }
          order.lines.forEach(function (ln) {
            var note = String(ln.note || '');
            note = note
              .replace(/\b(mild|spicy)\b/gi, '')
              .replace(/\s*[·|]\s*/g, ' · ')
              .replace(/^[\s·]+|[\s·]+$/g, '')
              .trim();
            ln.note = note ? level + ' · ' + note : level;
          });
          renderTicket();
          replyTool(callId, { ok: true, spice: level, ticket: ticketSnapshot() });
          return;
        }

        if (name === 'look_at_screen') {
          captureAndDescribeScreen()
            .then(function (result) {
              replyTool(callId, result);
              delete pendingCalls[callId];
            })
            .catch(function (err) {
              replyTool(callId, {
                ok: false,
                error: err && err.message ? err.message : 'vision failed',
                ticket: ticketSnapshot(),
              });
              delete pendingCalls[callId];
            });
          return;
        }

        if (name === 'set_tip') {
          var tipAmt = Number(args.amount);
          order.tip = isFinite(tipAmt) && tipAmt >= 0 ? tipAmt : 0;
          order.tipAsked = true;
          renderTicket();
          replyTool(callId, { ok: true, ticket: ticketSnapshot() });
          return;
        }

        if (name === 'set_instructions') {
          order.instructions = args.text != null ? String(args.text) : '';
          renderTicket();
          replyTool(callId, { ok: true, ticket: ticketSnapshot() });
          return;
        }

        if (name === 'clear_order') {
          resetOrder();
          resetCustomer();
          renderTicket();
          replyTool(callId, {
            ok: true,
            ticket: ticketSnapshot(),
            note: 'Full reset — lines and customer cleared.',
          });
          return;
        }

        if (name === 'confirm_and_pay') {
          if (order.paid) {
            replyTool(callId, {
              ok: true,
              paid: true,
              alreadyPaid: true,
              paymentIntentId: order.paymentIntentId || '',
              ticket: ticketSnapshot(),
            });
            return;
          }
          if (!order.lines.length) {
            replyTool(callId, { ok: false, paid: false, error: 'No items on ticket.' });
            return;
          }
          var gaps = payReadyGaps();
          if (gaps.length) {
            replyTool(callId, {
              ok: false,
              paid: false,
              code: 'missing_fields',
              missing: gaps,
              error:
                'Cannot charge yet. Still need: ' +
                gaps.join(', ') +
                '. Ask for those one at a time, then confirm_and_pay again after verbal yes.',
              ticket: ticketSnapshot(),
            });
            return;
          }
          setStatus('Charging card…');
          fetch('/api/charge-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticket: ticketSnapshot() }),
          })
            .then(function (r) {
              return r.json().then(function (data) {
                return { httpOk: r.ok, data: data };
              });
            })
            .then(function (res) {
              if (res.httpOk && res.data && res.data.paid) {
                order.paid = true;
                order.paymentIntentId = res.data.paymentIntentId || '';
                renderTicket();
                setStatus('Paid — Taco Voice');
                replyTool(callId, {
                  ok: true,
                  paid: true,
                  paymentIntentId: order.paymentIntentId,
                  amount: res.data.amount,
                  orderId: res.data.orderId || '',
                  ticket: ticketSnapshot(),
                });
              } else {
                setStatus('Massimo is on — talk anytime');
                replyTool(callId, {
                  ok: false,
                  paid: false,
                  code: (res.data && res.data.code) || 'charge_failed',
                  error: (res.data && res.data.error) || 'Charge failed',
                  ticket: ticketSnapshot(),
                });
              }
              delete pendingCalls[callId];
            })
            .catch(function () {
              setStatus('Massimo is on — talk anytime');
              replyTool(callId, {
                ok: false,
                paid: false,
                error: 'Network error charging card',
                ticket: ticketSnapshot(),
              });
              delete pendingCalls[callId];
            });
          return;
        }

        if (name === 'recall_customer') {
          var recallEmail = String(args.email || customer.email || '').trim();
          callMem0('recall', { email: recallEmail })
            .then(function (data) {
              replyTool(callId, data);
              delete pendingCalls[callId];
            })
            .catch(function () {
              replyTool(callId, { ok: false, error: 'Mem0 recall failed' });
              delete pendingCalls[callId];
            });
          return;
        }

        if (name === 'remember_customer') {
          var remEmail = String(args.email || customer.email || '').trim();
          callMem0('remember', {
            email: remEmail,
            text: String(args.text || ''),
            firstName: args.firstName || customer.firstName || '',
            lastName: args.lastName || customer.lastName || '',
            phone: args.phone || customer.phone || '',
          })
            .then(function (data) {
              replyTool(callId, data);
              delete pendingCalls[callId];
            })
            .catch(function () {
              replyTool(callId, { ok: false, error: 'Mem0 remember failed' });
              delete pendingCalls[callId];
            });
        }
      }

      function onServerEvent(raw) {
        var data;
        try {
          data = JSON.parse(raw);
        } catch (e) {
          return;
        }
        if (!data || !data.type) return;

        if (data.type === 'response.function_call_arguments.done') {
          var fname = data.name;
          var callId = data.call_id;
          if (!fname || !callId) return;
          if (pendingCalls[callId]) return;
          pendingCalls[callId] = true;
          var done = function () {
            delete pendingCalls[callId];
          };

          if (fname === 'ask_supervisor') {
            handleAskSupervisor(callId, data.arguments || '{}').finally(done);
            return;
          }
          if (
            fname === 'recall_customer' ||
            fname === 'remember_customer' ||
            fname === 'look_at_screen' ||
            fname === 'confirm_and_pay'
          ) {
            handleOrderTool(fname, callId, data.arguments || '{}');
            // replyTool is async inside — release lock after short delay if still stuck
            setTimeout(done, 20000);
            return;
          }
          if (
            fname === 'add_order_line' ||
            fname === 'set_customer' ||
            fname === 'set_fulfillment' ||
            fname === 'set_spice' ||
            fname === 'set_tip' ||
            fname === 'set_instructions' ||
            fname === 'clear_order'
          ) {
            try {
              handleOrderTool(fname, callId, data.arguments || '{}');
            } finally {
              done();
            }
            return;
          }
          done();
          return;
        }

        if (data.type === 'response.output_audio_transcript.done' && data.transcript) {
          pushHistory('massimo', data.transcript);
          maybeAutoHangUp(data.transcript, 'massimo');
          return;
        }
        if (
          (data.type === 'conversation.item.input_audio_transcription.completed' ||
            data.type === 'conversation.item.input_audio_transcription.done') &&
          data.transcript
        ) {
          pushHistory('customer', data.transcript);
          maybeCaptureFirstName(data.transcript);
          maybeAutoHangUp(data.transcript, 'customer');
          return;
        }
      }

      function maybeCaptureFirstName(transcript) {
        if (customer.firstName) return;
        var raw = String(transcript || '').trim();
        if (!raw) return;
        var t = raw
          .replace(/^((hi|hey|hello|yes|yeah|uh|um)[,.\s]+)+/i, '')
          .replace(/^(i('?m| am)|my name is|this is|it'?s)\s+/i, '')
          .replace(/[.,!?]+$/g, '')
          .trim();
        var words = t.split(/\s+/).filter(Boolean);
        if (words.length < 1 || words.length > 2) return;
        if (/taco|burrito|beef|chicken|pork|shrimp|coke|drink|order|spicy|mild|please|thanks|thank/i.test(t)) {
          return;
        }
        var first = words[0].replace(/[^A-Za-z'-]/g, '');
        if (first.length < 2) return;
        customer.firstName = first.charAt(0).toUpperCase() + first.slice(1);
        if (words.length === 2) {
          var last = words[1].replace(/[^A-Za-z'-]/g, '');
          if (last.length > 1) {
            customer.lastName = last.charAt(0).toUpperCase() + last.slice(1);
          }
        }
        renderTicket();
      }

      function captureAndDescribeScreen() {
        var ticketFallback = ticketSnapshot();
        function describeWithVision(base64) {
          return fetch('/api/vision', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: base64 }),
          }).then(function (r) {
            return r.json().then(function (data) {
              if (!r.ok) {
                return {
                  ok: false,
                  error: (data && data.error) || 'vision http ' + r.status,
                  ticket: ticketFallback,
                  screenText: '',
                };
              }
              return {
                ok: true,
                screenText: (data && data.text) || '',
                ticket: ticketFallback,
              };
            });
          });
        }

        if (typeof html2canvas !== 'function') {
          return Promise.resolve({
            ok: true,
            screenText: 'Use structured ticket. ' + JSON.stringify(ticketFallback),
            ticket: ticketFallback,
          });
        }

        return html2canvas(document.documentElement, {
          backgroundColor: '#1c1917',
          scale: 0.55,
          useCORS: true,
          logging: false,
          windowWidth: Math.max(document.documentElement.scrollWidth, window.innerWidth),
          windowHeight: Math.max(document.documentElement.scrollHeight, window.innerHeight),
        }).then(function (canvas) {
          var dataUrl = canvas.toDataURL('image/jpeg', 0.65);
          var base64 = dataUrl.replace(/^data:image\/jpeg;base64,/, '');
          return describeWithVision(base64);
        });
      }

      function stopAllMedia() {
        try {
          remoteAudio.muted = true;
          remoteAudio.pause();
          remoteAudio.srcObject = null;
          remoteAudio.removeAttribute('src');
          remoteAudio.load();
        } catch (e) {}
        if (localStream) {
          localStream.getTracks().forEach(function (t) {
            try {
              t.stop();
            } catch (e2) {}
          });
        }
        if (pc) {
          try {
            pc.getSenders().forEach(function (s) {
              if (s.track) {
                try {
                  s.track.stop();
                } catch (e3) {}
              }
            });
          } catch (e4) {}
          try {
            pc.getReceivers().forEach(function (r) {
              if (r.track) {
                try {
                  r.track.stop();
                } catch (e5) {}
              }
            });
          } catch (e6) {}
          try {
            pc.onicecandidate = null;
            pc.ontrack = null;
            pc.onconnectionstatechange = null;
            pc.close();
          } catch (e7) {}
        }
      }

      function cleanup() {
        sessionAlive = false;
        if (hangUpTimer) {
          clearTimeout(hangUpTimer);
          hangUpTimer = null;
        }
        try {
          if (dc && dc.readyState === 'open') {
            try {
              dc.send(JSON.stringify({ type: 'response.cancel' }));
            } catch (e) {}
            try {
              dc.send(JSON.stringify({ type: 'output_audio_buffer.clear' }));
            } catch (e2) {}
          }
        } catch (e3) {}
        try {
          if (dc) dc.close();
        } catch (e4) {}
        stopAllMedia();
        pc = null;
        dc = null;
        localStream = null;
        connected = false;
        connecting = false;
        history = [];
        pendingCalls = {};
        btn.disabled = false;
        btn.classList.remove('live');
        btn.textContent = 'Order Now';
      }

      function hangUp() {
        sessionAlive = false;
        resetOrder();
        resetCustomer();
        renderTicket();
        setStatus('');
        cleanup();
        try {
          remoteAudio.muted = false;
        } catch (e) {}
      }

      function maybeAutoHangUp(transcript, who) {
        // Only the customer ending the call — do not cut on Massimo saying "see you soon"
        if (who !== 'customer') return;
        var t = String(transcript || '').toLowerCase();
        if (!t) return;
        var bye =
          /\b(bye|goodbye|good bye|hang up|end call|end the call)\b/i.test(t) ||
          /\b(start over|start all over|start again|all over again)\b/i.test(t) ||
          /\b(thank you|thanks).{0,40}\b(bye|goodbye)\b/i.test(t);
        if (!bye) return;
        if (hangUpTimer) clearTimeout(hangUpTimer);
        // ~5s after customer farewell — room for Massimo's last line
        hangUpTimer = setTimeout(function () {
          if (!connected && !sessionAlive) return;
          hangUp();
        }, 5000);
      }

      async function startMassimo() {
        if (connected || sessionAlive || (pc && btn.classList.contains('live'))) {
          hangUp();
          return;
        }
        if (connecting) return;
        connecting = true;
        sessionAlive = false;
        btn.disabled = true;
        btn.textContent = 'Connecting…';
        setStatus('Talking to Massimo…');
        resetOrder();
        resetCustomer();
        renderTicket();

        try {
          var tokenPromise = fetch('/api/realtime-token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: '{}',
          }).then(async function (resp) {
            if (!resp.ok) {
              var errText = await resp.text().catch(function () { return ''; });
              throw new Error('token ' + resp.status + (errText ? ': ' + errText.slice(0, 180) : ''));
            }
            return resp.json();
          });

          localStream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: true,
            },
          });

          pc = new RTCPeerConnection();
          localStream.getTracks().forEach(function (track) {
            pc.addTrack(track, localStream);
          });

          pc.ontrack = function (ev) {
            if (!sessionAlive) {
              try {
                if (ev.track) ev.track.stop();
              } catch (e) {}
              return;
            }
            var stream = ev.streams && ev.streams[0] ? ev.streams[0] : new MediaStream([ev.track]);
            remoteAudio.muted = false;
            remoteAudio.srcObject = stream;
            remoteAudio.volume = 1;
            remoteAudio.play().catch(function () {});
          };

          var greetingExact =
            'Welcome to Taco Express. My name is Massimo. May I have your name?';
          var dcOpen = false;
          var greetingArmed = false;
          var greetingSpoken = false;

          function speakFixedGreeting() {
            if (!sessionAlive || !dcOpen || !greetingArmed || greetingSpoken) return;
            greetingSpoken = true;
            greetingArmed = false;
            // Kill any auto-started line so we only get ONE welcome
            dcSend({ type: 'response.cancel' });
            try {
              dcSend({ type: 'output_audio_buffer.clear' });
            } catch (e) {}
            dcSend({
              type: 'response.create',
              response: {
                instructions:
                  'Say EXACTLY and ONLY with a happy pleasant smiling warm tone and a steady natural pace: "' +
                  greetingExact +
                  '" Then stop. Pause. Listen for their name. Do not ask what they want yet. Nothing else. Do not repeat yourself. Do not say Welcome twice.',
              },
            });
          }

          dc = pc.createDataChannel('oai-events');
          dc.addEventListener('message', function (ev) {
            if (!sessionAlive) return;
            onServerEvent(ev.data);
          });
          dc.addEventListener('open', function () {
            dcOpen = true;
            // Only greet once everything is armed (avoid race double-speak)
            speakFixedGreeting();
          });

          var offer = await pc.createOffer();
          await pc.setLocalDescription(offer);

          var tokenPayload = await tokenPromise;
          if (!connecting) {
            cleanup();
            return;
          }
          var ephemeralKey = (tokenPayload.value || '').trim();
          if (!ephemeralKey) throw new Error('Missing ephemeral token');
          if (tokenPayload.greetingExact) greetingExact = String(tokenPayload.greetingExact);
          if (tokenPayload.taxRate != null && isFinite(Number(tokenPayload.taxRate))) {
            taxRate = Number(tokenPayload.taxRate);
          }

          var sdpResp = await fetch('https://api.openai.com/v1/realtime/calls', {
            method: 'POST',
            body: offer.sdp,
            headers: {
              Authorization: 'Bearer ' + ephemeralKey,
              'Content-Type': 'application/sdp',
            },
          });
          if (!sdpResp.ok) {
            var sdpErr = await sdpResp.text().catch(function () { return ''; });
            throw new Error('realtime ' + sdpResp.status + (sdpErr ? ': ' + sdpErr.slice(0, 180) : ''));
          }
          if (!connecting) {
            cleanup();
            return;
          }
          var answerSdp = await sdpResp.text();
          await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });

          sessionAlive = true;
          greetingArmed = true;
          speakFixedGreeting();

          connected = true;
          connecting = false;
          btn.disabled = false;
          btn.classList.add('live');
          btn.textContent = 'Hang Up';
          setStatus('Massimo is on — ticket updates as you order');
        } catch (e) {
          console.error('[Taco Massimo]', e);
          cleanup();
          setStatus('Could not start Massimo. Try again.');
        }
      }

      btn.addEventListener('click', function () {
        if (btn.classList.contains('live') || connected || sessionAlive) {
          hangUp();
          return;
        }
        startMassimo();
      });
    })();
  </script>
</body>
</html>
